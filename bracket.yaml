    date: 2026-07-04
    kickoff_et: "13:00"
    venue: houston
    home: Canada
    away: Morocco
    prediction: { winner: Morocco, p: 0.65 }   # 地力+疲労+ホーム(Canadaは非ホーム)

  - id: R16-2
    date: 2026-07-04
    kickoff_et: "17:00"
    venue: philadelphia
    home: Paraguay
    away: France
    prediction: { winner: France, p: 0.85 }   # 地力9.9倍

  - id: R16-3
    date: 2026-07-05
    kickoff_et: "16:00"
    venue: new_jersey
    home: Brazil
    away: Norway
    prediction: { winner: Brazil, p: 0.58 }

  - id: R16-4
    date: 2026-07-05
    kickoff_et: "20:00"
    venue: mexico_city
    home: Mexico
    away: England
    prediction: { winner: England, p: 0.66 }   # Mexicoにホーム+高地補正で80→66に縮小

  - id: R16-5
    date: 2026-07-06
    kickoff_et: "15:00"
    venue: arlington
    home: Spain
    away: Portugal
    prediction: { winner: Spain, p: 0.52 }   # 地力互角+Spainの疲労重くほぼ五分

  - id: R16-6
    date: 2026-07-06
    kickoff_et: "20:00"
