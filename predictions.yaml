# FIFA World Cup 2026 — 決勝トーナメント予想 (予想のみ)
#
# 事実(会場・日程・結果・組み合わせ)は bracket.yaml / group_stage.yaml / strength.yaml。
# ここは予想だけを持つ。id は bracket.yaml の各試合idに対応。
#   winner: 予想勝者   p: 勝率
# 末尾コメントは可読性のための対戦カード(R16は実カード, QF以降は予想勝者同士)。
#
# モデル: scripts/predict_r16.py → predict_qf.py → predict_sf.py → predict_final.py
#   地力(ln市場価値)を主軸、疲労を従、ホーム(+高地)補正。R16以降は延長なし前提。
# 更新手順: 実結果が出たら bracket.yaml に事実追記 → ここの該当予想を確定値に置換 →
#   後段ラウンドの予想スクリプトを再実行して更新。

# バージョン: ラウンドが進む/モデルを変えるたびに version を +1 し、
#   as_of・stage・確定済み予想を更新する。過去世代は git 履歴で辿れる。
meta:
  version: 4
  as_of: 2026-07-05        # この予想を立てた時点
  stage: R16-partial       # R16-1,2 確定。R16-3以降が未消化
  model:
    axes: [strength, fatigue, home, suspension]   # strength = 市場価値とEloのブレンド
    strength_blend: { market_value: 0.48, elo: 0.52 }  # 相関ベース(stage rho: mv0.66 / elo0.71)
    elo_snapshot: "2026-07-01"   # グループ終了時Elo。ノックアウト未反映=リーク/ネタバレなし
    lambda: 0.6            # 疲労の重み(ln-value単位)
    T: 1.3                # ロジスティック温度
    home: 0.45            # 自国会場ボーナス
    home_alt: 0.5         # ホーム×高地(>1500m)追加
    suspension: 0.20      # 主力先発の出場停止1枚あたりの減点
    note: R16以降は延長なし前提。怪我は非採用(公式データ不在)、出場停止のみ採用(公式カード)。
  inputs: [bracket.yaml, group_stage.yaml, strength.yaml, suspensions.yaml]
  scripts: [blend.py, predict_r16.py, predict_qf.py, predict_sf.py, predict_final.py]
  changelog:
    - "v1: 地力+疲労+ホームでR16〜優勝を予想"
    - "v2: R32公式レッドに基づきBalogun(USA)のR16-6出場停止を反映(-0.20)。R16-6 USA→Belgium、QF-3がSpain vs Belgiumに。SF/決勝(France優勝)は不変。"
    - "v3: 地力に Elo(2026-07-01=グループ終了時, リーク/ネタバレなし)をブレンド(mv0.48/elo0.52)。R16-8 Switzerland→Colombia, SF-2 England→Argentina で決勝は France vs Argentina に。優勝は France(55%)で不変。"
    - "v4: R16-1,2 の実結果を反映(確定)。Morocco 3-0 Canada, France 1-0 Paraguay(共に予想通り・90分決着・レッド0)。QF-1=Morocco vs France は不変、後段も変化なし。"

predictions:
  # --- R16 (実カード) ---   ※ 確定=実結果, それ以外は予想
  R16-1: { winner: Morocco,     p: 1.0, result: "3-0", status: 確定 }   # Morocco 3-0 Canada (予想通り)
  R16-2: { winner: France,      p: 1.0, result: "1-0", status: 確定 }   # France 1-0 Paraguay (予想通り)
  R16-3: { winner: Brazil,      p: 0.60 }   # Brazil vs Norway
  R16-4: { winner: England,     p: 0.53 }   # Mexico vs England (MexicoはElo高+ホーム+高地で接戦)
  R16-5: { winner: Spain,       p: 0.60 }   # Spain vs Portugal (SpainのElo最上位で差)
  R16-6: { winner: Belgium,     p: 0.54 }   # Belgium vs USA (Balogun停止+USAはElo低め)
  R16-7: { winner: Argentina,   p: 0.86 }   # Egypt vs Argentina (ArgentinaはElo#1)
  R16-8: { winner: Colombia,    p: 0.51 }   # Switzerland vs Colombia (ColombiaのElo#6が疲労を上回り反転)

  # --- QF (予想カード) ---
  QF-1: { winner: France,    p: 0.76 }   # Morocco vs France
  QF-2: { winner: England,   p: 0.53 }   # Brazil vs England (England高地負荷で接戦)
  QF-3: { winner: Spain,     p: 0.72 }   # Spain vs Belgium (SpainのElo最上位)
  QF-4: { winner: Argentina, p: 0.71 }   # Argentina vs Colombia (R16-8がEloでColombiaに)

  # --- SF (予想カード) ---
  SF-1: { winner: France,    p: 0.53 }   # France vs Spain (SpainのElo最上位でほぼ互角)
  SF-2: { winner: Argentina, p: 0.58 }   # England vs Argentina (ArgentinaのElo#1+低疲労で反転)

  # --- 決勝 ---
  FINAL: { winner: France, p: 0.55, runner_up: Argentina }   # France vs Argentina
