# FIFA World Cup 2026 — 決勝トーナメント予想 (予想のみ)
#
# 事実(会場・日程・結果・組み合わせ)は bracket.yaml / group_stage.yaml / strength.yaml。
# ここは予想だけを持つ。id は bracket.yaml の各試合idに対応。
#   winner: 予想勝者   p: 勝率
# 末尾コメントは可読性のための対戦カード(R16は実カード, QF以降は予想勝者同士)。
#
# モデル: scripts/predict_r16.py → predict_qf.py → predict_sf.py → predict_final.py
#   地力(ln市場価値)を主軸、疲労を従、ホーム(+高地)補正。疲労は消化済みラウンドの実出場分(延長込み)。
# 更新手順: 実結果が出たら bracket.yaml に事実追記 → ここの該当予想を確定値に置換 →
#   後段ラウンドの予想スクリプトを再実行して更新。

# バージョン: ラウンドが進む/モデルを変えるたびに version を +1 し、
#   as_of・stage・確定済み予想を更新する。過去世代は git 履歴で辿れる。
meta:
  version: 12
  as_of: 2026-07-15        # この予想を立てた時点
  stage: SF-partial        # SF-1 確定(Spain進出)。SF-2が未消化
  model:
    axes: [strength, fatigue, home, suspension]   # strength = 市場価値とEloのブレンド
    strength_blend: { market_value: 0.48, elo: 0.52 }  # 相関ベース(stage rho: mv0.66 / elo0.71)
    elo_snapshot: "2026-07-01"   # グループ終了時Elo。ノックアウト未反映=リーク/ネタバレなし
    lambda: 0.6            # 疲労の重み(ln-value単位)
    T: 1.3                # ロジスティック温度
    home: 0.45            # 自国会場ボーナス
    home_alt: 0.5         # ホーム×高地(>1500m)追加
    suspension: 0.20      # 主力先発の出場停止1枚あたりの減点
    note: 疲労は消化済みラウンドの実出場分(延長込み, bracketのminutes)を使用。怪我は非採用(公式データ不在)、出場停止のみ採用(公式カード)。
  inputs: [bracket.yaml, group_stage.yaml, strength.yaml, suspensions.yaml]
  scripts: [blend.py, predict_r16.py, predict_qf.py, predict_sf.py, predict_final.py]
  changelog:
    - "v1: 地力+疲労+ホームでR16〜優勝を予想"
    - "v2: R32公式レッドに基づきBalogun(USA)のR16-6出場停止を反映(-0.20)。R16-6 USA→Belgium、QF-3がSpain vs Belgiumに。SF/決勝(France優勝)は不変。"
    - "v3: 地力に Elo(2026-07-01=グループ終了時, リーク/ネタバレなし)をブレンド(mv0.48/elo0.52)。R16-8 Switzerland→Colombia, SF-2 England→Argentina で決勝は France vs Argentina に。優勝は France(55%)で不変。"
    - "v4: R16-1,2 の実結果を反映(確定)。Morocco 3-0 Canada, France 1-0 Paraguay(共に予想通り・90分決着・レッド0)。QF-1=Morocco vs France は不変、後段も変化なし。"
    - "v5: R16-3,4 の実結果を反映(確定)。Norway 2-1 Brazil(番狂わせ・予想はBrazil60%), England 3-2 Mexico(予想通り)。QF-2 が Norway vs England に変わりEngland優位が拡大(53%→63%)。R16-4 Quansah(England)退場→QF-2出場停止だがSpence復帰で実効減点なし。SF/決勝(France優勝55%)は不変。"
    - "v6: 事実修正。Balogun(USA)のR16-6出場停止がFIFA(Article 27)により取消・Belgium異議も棄却→出場可。R16-6の-0.20減点を撤回し Belgium 54%→51%(予想勝者は不変)。QF-3以降も不変。(注: R16-5=Spain 1-0 Portugal 確定は別途bracketに反映予定)"
    - "v7: R16-5〜8 の実結果を反映(確定)。Spain 1-0 Portugal, Belgium 4-1 USA, Argentina 3-2 Egypt(2点差逆転)は予想通り。R16-8 Switzerland 0-0 Colombia(PK4-3)は番狂わせ(予想Colombia51%)。ベスト8確定・R16は7/8的中(外したのはR16-3とR16-8)。QF-4が Argentina vs Switzerland に変わる(Argentina72%)。SF/決勝(France優勝55%, 相手Argentina)は不変。"
    - "v8: QF-1 の実結果を反映(確定)。France 2-0 Morocco(予想通り, 90分決着・レッド0)。France はSF-1へ。SF/決勝(France優勝55%, 相手Argentina)は不変。※Mbappé足首痛の早期交代は報道あるが、怪我は非採用方針のため数値未反映。"
    - "v9: QF-3 の実結果を反映(確定)。Spain 2-1 Belgium(予想通り, 90分決着・レッド0, Merino 88'決勝)。Spain はSF-1へ。SF-1=France vs Spain 確定カードに(予想France53%)。SF/決勝(France優勝55%, 相手Argentina)は不変。"
    - "v10: QF-2,4 の実結果を反映(確定)。England 2-1 Norway(延長), Argentina 3-1 Switzerland(延長)ともに予想通り。ベスト4=France,Spain,England,Argentina。SF-2=England vs Argentina 確定カードに(予想Argentina58%)。QF-4でEmbolo(Switzerland)が2枚目退場だが敗退のため影響なし。SF/決勝(France優勝55%)は不変。"
    - "v11: モデル改良。SF/決勝の疲労計算をQF/R16=90分固定から bracketの実minutes参照(延長込み)に変更(predict_sf.py, predict_final.py)。England/Argentinaの延長120分が反映され、決勝でArgentinaの疲労がFranceと同水準に(従来はArgentinaがやや軽め0.497→0.515)。SF(France53%/Argentina58%)・優勝(France55%)の順位は不変。※予想段階のR16/QF(predict_r16/qf)は従来どおり90分前提(消化前は延長不明のため)。"
    - "v12: SF-1 の実結果を反映(確定)。Spain 2-0 France(番狂わせ・予想France53%, 90分決着・レッド0)。大会通じて本命だったFranceが敗退し、Spainが決勝進出。決勝カードが Spain vs (SF-2勝者=予想Argentina) に変わり、優勝予想は France55% → Spain53%(相手Argentina47%)に交代。SF-2(England vs Argentina, 予想Argentina58%)は未消化。"

